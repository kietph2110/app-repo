name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest, ${{ secrets.DOCKERHUB_USERNAME }}/myapp:${{ github.sha }}

  update-config:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: kietph2110/gitops-config
          token: ${{ secrets.PAT_TOKEN }}
          
      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/myapp:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/myapp:${{ github.sha }}|g" deployment.yaml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "CD: Cập nhật image tag lên ${{ github.sha }}"
          git push